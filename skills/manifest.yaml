# TheTower Skills Manifest
# 路由单一真相源：所有 skill 的触发规则、排除条件、产出契约、next 链在此定义。

skills:
  a2a-channel-semantics:
    category: "协作"
    name: a2a-channel-semantics
    description: >
      A2A 消息通道语义：stream（私有 CLI 输出）与 callback（公开发言）的边界。
      stdout 不会自动公开；要发言必须 post_message；不在公开 post 里复述私密内容或元数据。
      Use when: 任意 Agent 在 thread 中回复、运行中写回、@ 队友、私密交接或阶段性汇报。
      Not for: 无。
      Output: 通道语义正确、不泄漏私密元数据的 thread 消息。
    enabled: true
    priority: 130
    triggers:
      always: true
    output: "Channel-safe A2A reply"
    next: ["thread-orchestration", "cross-agent-handoff"]

  thread-orchestration:
    category: "协作"
    name: thread-orchestration
    description: >
      TheTower thread 协作和 A2A 路由基础协议。所有 Agent 默认启用。
      Use when: 任意 Agent 在 thread 中回复、接力、收束或解释上下文。
      Not for: 无。
      Output: 符合 thread 路由协议的回复。
    enabled: true
    priority: 120
    triggers:
      always: true
    output: "Thread-safe collaboration reply"
    next: ["cross-agent-handoff", "quality-gate"]

  cross-agent-handoff:
    category: "协作"
    name: cross-agent-handoff
    description: >
      跨 Agent 传话/交接的五件套结构：What / Why / Tradeoff / Open Questions / Next Action。
      Use when: 交接工作给其他 Agent、传话、请求 review。
      Not for: 自己继续执行、不涉及其他 Agent 的普通回复、确认/致谢/总结完成。
      Output: 结构化交接消息。
    enabled: true
    priority: 100
    triggers:
      handoff: true
      keywords: ["交接", "传话", "说一句", "带句话", "转告", "handoff", "review"]
    not_for:
      - "确认"
      - "致谢"
      - "总结完成"
    output: "Structured handoff message"
    next: ["receive-handoff-grounding"]

  receive-handoff-grounding:
    category: "协作"
    name: receive-handoff-grounding
    description: >
      接收其他 Agent 交接后，先校准 claim、上下文和下一步动作，避免把传话者当事实源。
      Use when: 当前 Agent 是被其他 Agent A2A 唤醒。
      Not for: 用户直接点名的普通任务。
      Output: 接球校准 + 执行或退回决策。
    enabled: true
    priority: 90
    triggers:
      receiveHandoff: true
    output: "Grounded handoff intake"
    next: ["quality-gate", "cross-agent-handoff"]

  quality-gate:
    category: "治理"
    name: quality-gate
    description: >
      当前 worklist 收束前的自检门禁：任务完成度、证据、未决项和是否需要继续路由。
      Use when: 当前 Agent 是 worklist 最后一位，或声称任务完成。
      Not for: 收到 review 反馈。
      Output: 简短交付检查和最终结论。
    enabled: true
    priority: 80
    triggers:
      finalAgent: true
      keywords: ["完成", "交付", "自检"]
    output: "Quality gate summary"
    next: ["request-review"]

  request-review:
    category: "治理"
    name: request-review
    description: >
      自检通过后向其他 Agent 发起 review，请求中必须包含五件套和验证证据。
      Use when: 准备请其他 Agent review。
      Not for: 收到 review 结果。
      Output: Review 请求消息。
    enabled: true
    priority: 70
    triggers:
      keywords: ["请 review", "帮我看看", "request review"]
    output: "Review request"
    next: ["receive-review"]

  receive-review:
    category: "治理"
    name: receive-review
    description: >
      处理 reviewer 反馈：先分类和验证，再修复或 push back，禁止表演性同意。
      Use when: 收到 review 意见、changes requested、需要处理反馈。
      Not for: 发起 review 请求。
      Output: 逐项反馈处理结果。
    enabled: true
    priority: 70
    triggers:
      keywords: ["review 结果", "review 意见", "changes requested", "fix these"]
    output: "Review response"
    next: ["quality-gate"]

  context-self-management:
    category: "协作"
    name: context-self-management
    description: >
      当 thread 上下文变长、话题漂移或当前 Agent 无法可靠继续时，判断是继续、收束、交接还是请求用户确认。
      Use when: 上下文明显变长、任务跨越多个主题、Agent 发现自己无法可靠复盘前情。
      Not for: 正常短对话、只是想逃避当前任务。
      Output: 上下文状态判断 + 继续/交接/询问用户的决策。
    enabled: true
    priority: 60
    triggers:
      keywords: ["上下文", "context", "太长", "接不上", "总结一下前情"]
    output: "Context management decision"
    next: ["cross-agent-handoff", "quality-gate"]

  collaborative-thinking:
    category: "协作"
    name: collaborative-thinking
    description: >
      单人或多人创意探索、独立思考、讨论收敛。三模式：单人探索（Mode A）/ 多 Agent 独立思考（Mode B，待并行 dispatch）/ 收敛沉淀（Mode C）。
      Use when: brainstorm、多 Agent 独立思考、讨论结束需要收敛、方向性问题需要多视角。
      Not for: 已有明确 spec 直接写代码、单个 Agent 执行已定方案。
      Output: 收敛报告（共识/分歧/行动项）+ 收敛三件套检查。
    enabled: true
    priority: 50
    triggers:
      keywords: ["brainstorm", "讨论", "多 agent 独立思考", "收敛", "讨论结束", "总结一下"]
    output: "Convergence report + sediment check"
    next: ["quality-gate", "cross-agent-handoff"]

  expert-panel:
    category: "协作"
    name: expert-panel
    description: >
      多 Agent 专家辩论团：在现有协作习惯上加角色分工 + WHY 链标准 + 交付链。
      Use when: 技术趋势判断、竞品分析、行业事件分析、需要多视角决策支持、operator 说"帮我分析一下"。
      Not for: 单个 Agent 能搞定的问题、代码实现、bug fix、日常聊天。
      Output: WHY 链分析 + 收敛报告（共识/分歧/Tradeoffs/Open Questions/行动项）。
    enabled: true
    priority: 45
    triggers:
      keywords: ["帮我分析一下", "专家辩论", "expert panel", "技术参谋", "竞品分析", "行业分析", "趋势判断", "多 agent 分析"]
    output: "WHY-chain analysis + convergence report"
    next: ["collaborative-thinking", "quality-gate"]

  worktree:
    category: "开发"
    name: worktree
    description: >
      创建 Git worktree 隔离开发环境。
      Use when: 开始任何非 trivial 的代码修改、新功能开发、bug fix。
      Not for: 纯文档修改（≤5 行）、不涉及代码/脚本/API/执行面的讨论。
      Output: 隔离的 worktree + 基线测试通过。
    enabled: true
    priority: 58
    triggers:
      keywords: ["开始开发", "新 worktree", "开 worktree"]
    output: "Isolated worktree ready"
    next: ["tdd", "writing-plans"]

  writing-plans:
    category: "开发"
    name: writing-plans
    description: >
      将 spec/需求拆分为可执行的分步实施计划。
      Use when: 有 spec 或需求，准备动手前需要拆分步骤。
      Not for: trivial 改动（≤5 行）、已有详细计划。
      Output: 分步实施计划（含 TDD 步骤和检查点）。
    enabled: true
    priority: 55
    triggers:
      keywords: ["写计划", "implementation plan", "拆分步骤"]
    output: "Step-by-step implementation plan"
    next: ["worktree", "tdd"]

  tdd:
    category: "开发"
    name: tdd
    description: >
      Red-Green-Refactor 测试驱动开发纪律。
      Use when: 写新功能代码、修 bug、任何实现工作。
      Not for: 纯文档、纯调研、已有充分测试的 trivial 改动。
      Output: 失败测试 → 最小实现 → 重构，全程有测试保护。
    enabled: true
    priority: 40
    triggers:
      keywords: ["写代码", "test first", "TDD", "红绿重构"]
    output: "Test-driven implementation"
    next: ["quality-gate"]

  debugging:
    category: "开发"
    name: debugging
    description: >
      系统化 bug 定位：根因调查 → 模式分析 → 假设验证 → 修复。
      Use when: 遇到 bug、测试失败、unexpected behavior。
      Not for: 新功能开发、重构、已知原因的简单修复。
      Output: Bug report（五件套）+ 根因 + 修复（含回归测试）。
    enabled: true
    priority: 40
    triggers:
      keywords: ["bug", "报错", "test failure", "unexpected behavior"]
    output: "Bug report + root cause + fix"
    next: ["tdd", "quality-gate"]

  self-evolution:
    category: "治理"
    name: self-evolution
    description: >
      Scope Guard + Process Evolution + Knowledge Evolution — 主动护栏与自我进化。
      Use when: operator scope 发散偏离愿景、同类错误反复出现、SOP 流程缺口、有价值的知识/方法论值得沉淀。
      Not for: 日常 SOP 推进（正常执行）、一次性个案 bug fix。
      Output: Scope Guard 记录 / Evolution Proposal 提案 / 知识沉淀到 auto-memory。
    enabled: true
    priority: 35
    triggers:
      keywords: ["scope 漂了", "反复出错", "流程缺口", "值得沉淀", "自我进化"]
    output: "Evolution record + sediment"
    next: ["quality-gate"]

  vision-rescue:
    category: "治理"
    name: vision-rescue
    description: >
      绝境反转方法论：当任务似乎没有希望、反复摆动、准备放弃愿景时的五步突破框架。
      Use when: 任务看起来无解、多次尝试失败后想放弃、输出投降修辞、连续 3+ 轮在希望与绝望间摆动。
      Not for: 未出现绝境信号的常规 debugging、常规探索/调研、operator 已签字降级的目标、trivial 任务。
      Output: Desperation Packet（六问证据评估）+ 新方向行动计划 / operator 升级请求。
    enabled: true
    priority: 30
    triggers:
      keywords: ["没希望", "没救了", "无解", "死胡同", "不可能", "接受现实", "放弃", "走投无路", "都试过了", "现状最优", "不值得继续", "保守路径", "实际价值变了", "收口", "vision rescue"]
    output: "Desperation Packet + action plan"
    next: ["collaborative-thinking", "self-evolution"]
